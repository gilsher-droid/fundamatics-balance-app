<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fundamatics — Horizontal Asymptote Balance</title>

  <style>

    :root{
      --fm-blue:#4D9DFF;
      --fm-blue-deep:#2F7EEA;
      --fm-violet:#7F5CFF;
      --fm-pink:#FF5DAA;
      --fm-yellow:#FFD35A;
      --fm-orange:#FF9F43;
      --fm-green:#49D17D;
      --fm-ink:#102033;
      --fm-card:rgba(255,255,255,.95);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;

      background:
        radial-gradient(circle at 82% 8%, rgba(255,255,255,.24), transparent 30%),
        radial-gradient(circle at 12% 0%, rgba(255,211,90,.18), transparent 25%),
        linear-gradient(135deg,var(--fm-blue),var(--fm-blue-deep),var(--fm-violet));

      color:var(--fm-ink);

      padding:16px;
    }

    .wrap{
      max-width:1200px;
      margin:auto;
    }

    header{
      text-align:center;
      color:white;
      margin-bottom:22px;
    }

    header::before{

      content:'';

      display:block;

      width:92px;
      height:92px;

      margin:0 auto 14px;

      background-image:url('./assets/images/logo.jpeg');
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;

      border-radius:26px;

      background-color:white;

      border:3px solid rgba(255,255,255,.72);

      box-shadow:
        0 16px 34px rgba(16,32,51,.24);

    }

    header h1{
      margin:0;
      font-size:clamp(28px,6vw,40px);
    }

    header p{
      margin-top:10px;
      font-size:clamp(16px,3vw,20px);
      opacity:.95;
    }

    .panel{

      background:var(--fm-card);

      border-radius:32px;

      padding:22px;

      backdrop-filter:blur(10px);

      box-shadow:
        0 24px 70px rgba(16,32,51,.25);

      border:1px solid rgba(255,255,255,.6);
    }

    .function-box{

      background:linear-gradient(135deg,#ffffff,#eef6ff);

      border-radius:26px;

      padding:18px;

      margin-bottom:20px;

      text-align:center;

      border:2px solid rgba(255,255,255,.75);
    }

    .function-title{
      font-size:20px;
      font-weight:700;
      margin-bottom:14px;
    }

    .fraction{

      display:inline-grid;

      grid-template-rows:auto 4px auto;

      gap:8px;

      direction:ltr;

      align-items:center;

      font-size:clamp(24px,5vw,36px);

      font-weight:bold;

      min-width:min(360px,90vw);

    }

    .line{
      height:4px;
      border-radius:999px;

      background:
        linear-gradient(
          90deg,
          var(--fm-pink),
          var(--fm-yellow),
          var(--fm-blue)
        );
    }

    .poly{
      padding:0 12px;
    }

    .lead-coef{

      display:inline-block;

      background:
        linear-gradient(
          135deg,
          var(--fm-yellow),
          var(--fm-orange)
        );

      padding:2px 8px;

      border-radius:12px;

      color:var(--fm-ink);

      box-shadow:
        0 6px 16px rgba(16,32,51,.18);

      transform:scale(1.05);

    }

    .controls{
      margin-bottom:20px;
    }

    .box{

      background:white;

      border-radius:24px;

      padding:18px;

      border:2px solid #e8eef8;
    }

    textarea{

      width:100%;

      height:90px;

      border-radius:16px;

      border:1px solid #d0d8e6;

      padding:14px;

      resize:vertical;

      font-size:16px;

      direction:ltr;

      font-family:monospace;
    }

    .hint{
      margin-top:10px;
      color:#60758f;
      line-height:1.5;
      font-size:14px;
    }

    button{

      border:none;

      border-radius:16px;

      padding:13px 18px;

      cursor:pointer;

      color:white;

      font-weight:700;

      margin-top:12px;

      background:
        linear-gradient(
          135deg,
          var(--fm-violet),
          var(--fm-blue-deep)
        );

      box-shadow:
        0 10px 24px rgba(47,126,234,.22);
    }

    button.secondary{

      background:
        linear-gradient(
          135deg,
          var(--fm-pink),
          var(--fm-orange)
        );
    }

    .balance-area{

      position:relative;

      height:min(420px,82vw);

      min-height:320px;

      border-radius:30px;

      overflow:hidden;

      margin-top:22px;

      background:
        radial-gradient(circle at 50% 12%, rgba(255,211,90,.20), transparent 25%),
        linear-gradient(#f9fcff,#eef5ff);

      border:1px solid #dce8f8;
    }

    .sky,
    .ground{

      position:absolute;

      left:0;
      right:0;

      text-align:center;

      font-weight:bold;

      opacity:0;

      transition:.5s;

      z-index:10;

      pointer-events:none;

      padding:0 12px;
    }

    .sky{
      top:16px;
      color:#2F7EEA;
      font-size:clamp(16px,4vw,24px);
    }

    .ground{
      bottom:14px;
      color:#56703b;
      font-size:clamp(16px,4vw,22px);
    }

    .go-sky .sky{
      opacity:1;
    }

    .go-ground .ground{
      opacity:1;
    }

    .beam{

      position:absolute;

      width:min(560px,82vw);

      height:clamp(8px,1.8vw,14px);

      left:50%;
      top:45%;

      transform:translateX(-50%);

      transform-origin:center;

      border-radius:999px;

      transition:1s;

      background:
        linear-gradient(
          90deg,
          var(--fm-violet),
          var(--fm-blue-deep),
          var(--fm-pink)
        );
    }

    .pivot{

      position:absolute;

      left:50%;
      top:48%;

      transform:translateX(-50%);

      width:0;
      height:0;

      border-left:clamp(24px,5vw,42px) solid transparent;
      border-right:clamp(24px,5vw,42px) solid transparent;

      border-bottom:clamp(70px,16vw,125px) solid var(--fm-ink);
    }

    .pan{

      position:absolute;

      width:min(190px,34vw);

      height:clamp(10px,2vw,18px);

      background:var(--fm-ink);

      border-radius:50%;

      transition:1s;
    }

    .pan.left{
      left:clamp(54px,19vw,215px);
      top:57%;
    }

    .pan.right{
      right:clamp(54px,19vw,215px);
      top:57%;
    }

    .weight{

      position:absolute;

      width:clamp(76px,18vw,118px);

      height:clamp(56px,13vw,82px);

      border-radius:22px;

      display:flex;

      align-items:center;
      justify-content:center;

      font-size:clamp(22px,5vw,32px);

      font-weight:bold;

      background:
        linear-gradient(
          135deg,
          var(--fm-yellow),
          var(--fm-orange)
        );

      box-shadow:
        0 10px 24px rgba(0,0,0,.18);

      transition:1s;

      z-index:5;
    }

    .weight.left{
      left:clamp(96px,22vw,251px);
      top:62%;
    }

    .weight.right{
      right:clamp(96px,22vw,251px);
      top:62%;
    }

    .rocket,
    .seed,
    .judge{

      position:absolute;

      opacity:0;

      transition:1s;

      z-index:20;
    }

    .rocket{

      left:10%;

      bottom:-120px;

      font-size:clamp(42px,10vw,76px);
    }

    .seed{

      right:10%;

      top:-120px;

      font-size:clamp(42px,10vw,76px);
    }

    .judge{

      left:50%;
      top:8%;

      transform:translateX(-50%) scale(.4);

      font-size:clamp(48px,12vw,86px);

      text-align:center;
    }

    .judge small{

      display:block;

      margin-top:6px;

      background:white;

      padding:6px 12px;

      border-radius:999px;

      font-size:14px;

      box-shadow:
        0 4px 14px rgba(0,0,0,.15);
    }

    .go-sky .rocket{
      opacity:1;
      bottom:58%;
    }

    .go-ground .seed{
      opacity:1;
      top:58%;
    }

    .equal .judge{
      opacity:1;
      transform:translateX(-50%) scale(1);
    }

    .go-sky .beam{
      transform:translateX(-50%) rotate(-12deg);
    }

    .go-ground .beam{
      transform:translateX(-50%) rotate(12deg);
    }

    .go-sky .weight.left{
      top:72%;
    }

    .go-sky .weight.right{
      top:50%;
    }

    .go-ground .weight.left{
      top:50%;
    }

    .go-ground .weight.right{
      top:72%;
    }

    .result{

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:18px;

      margin-top:22px;
    }

    .result-box{

      background:white;

      border-radius:24px;

      padding:18px;

      border:2px solid #e8eef8;
    }

    .result-box h2{
      margin-top:0;
    }

    .answer{

      font-size:clamp(34px,7vw,52px);

      font-weight:bold;

      text-align:center;

      color:var(--fm-blue-deep);

      margin-top:20px;
    }

    .coef-calc{

      margin-top:14px;

      padding:14px;

      border-radius:18px;

      text-align:center;

      font-size:clamp(20px,5vw,28px);

      font-weight:800;

      direction:ltr;

      background:
        linear-gradient(
          135deg,
          #fff6d3,
          #eef6ff
        );

      border:2px solid #ffe08a;
    }

    .tag{

      display:inline-block;

      margin:4px;

      padding:8px 12px;

      border-radius:999px;

      background:rgba(255,255,255,.8);

      border:1px solid #d6e6ff;

      font-size:14px;
    }

    @media(max-width:850px){

      body{
        padding:10px;
      }

      .panel{
        padding:16px;
      }

      .result{
        grid-template-columns:1fr;
      }

      .balance-area{
        height:380px;
      }

    }

  </style>

</head>

<body>

<div class="wrap">

  <header>

    <h1>
      מאזניים לאסימפטוטה אופקית
    </h1>

    <p>
      מי כבד יותר? המונה או המכנה?
    </p>

  </header>

  <div class="panel">

    <div class="function-box">

      <div class="function-title">
        הפונקציה הרציונלית
      </div>

      <div class="fraction">

        <div class="poly" id="numView">
          3x² + 1
        </div>

        <div class="line"></div>

        <div class="poly" id="denView">
          6x² - 4
        </div>

      </div>

    </div>

    <div class="controls">

      <div class="box">

        <textarea id="funcInput">(3x^2 + 1)/(6x^2 - 4)</textarea>

        <div class="hint">
          למשל:
          (2x^3+5)/(4x^2-1)
        </div>

        <button onclick="parseAndUpdate()">
          נתח פונקציה
        </button>

        <button class="secondary" onclick="randomFunction()">
          הגרל פונקציה
        </button>

      </div>

    </div>

    <div class="balance-area" id="scene">

      <div class="sky">
        המונה כבד יותר → הולכים לשמיים 🚀
      </div>

      <div class="ground">
        המכנה כבד יותר → y = 0 🌱
      </div>

      <div class="judge">
        👨‍⚖️
        <small>
          השופט בודק מקדמים
        </small>
      </div>

      <div class="rocket">
        🚀
      </div>

      <div class="seed">
        🌱
      </div>

      <div class="beam"></div>

      <div class="pivot"></div>

      <div class="pan left"></div>

      <div class="pan right"></div>

      <div class="weight left" id="wL">
        x²
      </div>

      <div class="weight right" id="wR">
        x²
      </div>

    </div>

    <div class="result">

      <div class="result-box">

        <h2>
          מה המאזניים אומרים?
        </h2>

        <div id="explanation"></div>

      </div>

      <div class="result-box">

        <h2>
          האסימפטוטה האופקית
        </h2>

        <div class="answer" id="answer"></div>

      </div>

    </div>

  </div>

</div>

<script>

const explanation =
  document.getElementById('explanation');

const answer =
  document.getElementById('answer');

const wL =
  document.getElementById('wL');

const wR =
  document.getElementById('wR');

const scene =
  document.getElementById('scene');

const numView =
  document.getElementById('numView');

const denView =
  document.getElementById('denView');

const funcInput =
  document.getElementById('funcInput');

function toSup(n){

  return String(n)
    .split('')
    .map(c=>'⁰¹²³⁴⁵⁶⁷⁸⁹'[c]||c)
    .join('');
}

function powLabel(d){

  if(d===0) return '1';

  if(d===1) return 'x';

  return 'x'+toSup(d);
}

function clean(s){

  return s
    .replace(/\s/g,'')
    .replace(/−/g,'-');
}

function pretty(s){

  return s
    .replace(/\^([0-9]+)/g,(m,n)=>toSup(n));
}

function leading(poly){

  let p = clean(poly);

  p = p.replace(/-/g,'+-');

  if(p[0]==='+'){
    p = p.slice(1);
  }

  let terms =
    p.split('+').filter(Boolean);

  let bestDeg = -1;
  let bestCoef = 0;

  for(const t of terms){

    let deg = 0;
    let coef = 0;

    if(t.includes('x')){

      let before =
        t.split('x')[0];

      if(before==='' || before==='+'){
        coef = 1;
      }

      else if(before==='-'){
        coef = -1;
      }

      else{
        coef = Number(before);
      }

      let pow =
        t.match(/x\^(\d+)/);

      deg = pow ? Number(pow[1]) : 1;
    }

    else{

      coef = Number(t);
      deg = 0;
    }

    if(deg > bestDeg){

      bestDeg = deg;
      bestCoef = coef;
    }
  }

  return {
    deg:bestDeg,
    coef:bestCoef
  };
}

function highlightLeading(poly,lead){

  let p = pretty(poly);

  const coefText =
    lead.coef===1
    ? ''
    : lead.coef===-1
      ? '-'
      : String(lead.coef);

  const powerText =
    lead.deg===1
    ? 'x'
    : 'x'+toSup(lead.deg);

  const term =
    coefText + powerText;

  return p.replace(
    term,
    '<span class="lead-coef">'+term+'</span>'
  );
}

function splitFraction(input){

  let s = clean(input);

  let parts = s.split('/');

  if(parts.length!==2){

    alert('כתוב פונקציה בצורה מונה/מכנה');

    return null;
  }

  return parts.map(p=>p.replace(/[()]/g,''));
}

function parseAndUpdate(){

  const parts =
    splitFraction(funcInput.value);

  if(!parts) return;

  const n = parts[0];
  const d = parts[1];

  const nl = leading(n);
  const dl = leading(d);

  numView.innerHTML =
    highlightLeading(n,nl);

  denView.innerHTML =
    highlightLeading(d,dl);

  update(nl,dl);
}

function update(nl,dl){

  const nd = nl.deg;
  const dd = dl.deg;

  const nc = nl.coef;
  const dc = dl.coef;

  scene.className =
    'balance-area';

  wL.innerHTML =
    powLabel(nd);

  wR.innerHTML =
    powLabel(dd);

  let text = '';
  let ans = '';

  if(nd > dd){

    scene.classList.add('go-sky');

    text =
      `
      המונה שוקל יותר ולכן הפונקציה לא מתייצבת.
      היא הולכת לשמיים.
      `;

    ans = 'אין';
  }

  else if(nd < dd){

    scene.classList.add('go-ground');

    text =
      `
      המכנה שוקל יותר.
      משהו קטן חלקי משהו עצום מתקרב ל־0.
      `;

    ans = 'y = 0';
  }

  else{

    scene.classList.add('equal');

    const val =
      (nc/dc).toFixed(2);

    text =
      `
      המשקלים זהים ולכן השופט בודק את המקדמים.

      <div class="coef-calc">
        ${nc} ÷ ${dc} = ${val}
      </div>
      `;

    ans = 'y = ' + val;
  }

  explanation.innerHTML = text;

  answer.innerHTML = ans;
}

function randomFunction(){

  const cases =
    ['sky','ground','equal'];

  const c =
    cases[Math.floor(Math.random()*cases.length)];

  let nd,dd;

  if(c==='sky'){

    dd =
      Math.floor(Math.random()*3)+1;

    nd = dd + 1;
  }

  else if(c==='ground'){

    nd =
      Math.floor(Math.random()*3)+1;

    dd = nd + 1;
  }

  else{

    nd = dd =
      Math.floor(Math.random()*4)+1;
  }

  const nc =
    Math.floor(Math.random()*8)+1;

  const dc =
    Math.floor(Math.random()*8)+1;

  const func =
    `(${nc}x^${nd}+1)/(${dc}x^${dd}-4)`;

  funcInput.value = func;

  parseAndUpdate();
}

parseAndUpdate();

</script>

</body>
</html>
